<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duino-Coin Monitor Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <header>
        <div class="brand">
            <img src="https://cdn.brandfetch.io/id3ybMU0EP/w/1080/h/1080/theme/dark/logo.png?c=1dxbfHSJFAPEGdCLU4o5B" alt="Duino Coin" id="siteLogo">
            <h1>Duino-Coin Monitor</h1>
        </div>

        <div class="settings-controls">
            <button class="icon-btn" onclick="toggleTheme()" title="Сменить тему">
                <svg class="icon-svg" viewBox="0 0 24 24" id="themeIcon">
                    <path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.79 1.41-1.41-1.79-1.79-1.41 1.41zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/>
                </svg>
            </button>
            <button class="icon-btn" onclick="toggleLang()" title="Сменить язык">
                <span style="font-weight:bold; font-size:14px;" id="langLabel">RU</span>
            </button>
        </div>

        <div class="user-controls">
            <div class="input-icon">
                <svg class="icon-svg" viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <input type="text" id="usernameInput" placeholder="..." autocomplete="off">
            <button id="searchBtn" class="btn-main">
                <svg class="icon-svg" viewBox="0 0 24 24" style="fill: currentColor;">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5, 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <span id="btnSearchText">Поиск</span>
            </button>
        </div>
    </header>

    <div class="status-bar">
        <div id="statusDot" class="dot"></div>
        <span id="lastUpdate">...</span>
    </div>

    <div id="errorMessage" class="error-msg" style="display:none;"></div>

    <div class="stats-grid">
        <div class="card">
            <div class="card-icon-wrapper">
                <svg class="icon-svg icon-lg" viewBox="0 0 24 24">
                    <path d="M20.38 8.57l-1.23 1.85a8 8 0 0 1-.22 7.58H5.07A8 8 0 0 1 15.58 6.85l1.85-1.23A10 10 0 0 0 3.35 19a2 2 0 0 0 1.72 1h13.85a2 2 0 0 0 1.74-1 10 10 0 0 0-.27-10.44zm-9.79 6.84a2 2 0 0 0 2.83 0l5.66-8.49-8.49 5.66a2 2 0 0 0 0 2.83z"/>
                </svg>
            </div>
            <div class="card-label" id="lblHashrate">---</div>
            <div class="card-value" id="hashrate">0.00 H/s</div>
        </div>
        
        <div class="card">
            <div class="card-icon-wrapper">
                <svg class="icon-svg icon-lg" viewBox="0 0 24 24">
                    <path d="M4 6h18V4H4c-1.1 0-2 .9-2 2v11H0v3h14v-3H4V6zm19 2h-6c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h6c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1zm-1 9h-4v-7h4v7z"/>
                </svg>
            </div>
            <div class="card-label" id="lblWorkers">---</div>
            <div class="card-value" id="workers">0</div>
        </div>

        <div class="card">
            <div class="card-icon-wrapper">
                <svg class="icon-svg icon-lg" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
            </div>
            <div class="card-label" id="lblDifficulty">---</div>
            <div class="card-value" id="difficultyDisplay">...</div>
            <div class="card-subtext">DUCO-S1A</div>
        </div>
    </div>

    <div class="chart-section">
        <div class="section-header">
            <h3 class="section-title">
                <svg class="icon-svg" viewBox="0 0 24 24" style="width:18px;height:18px;">
                    <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
                </svg>
                <span id="lblChartTitle">---</span>
            </h3>
        </div>
        <div style="position: relative; height: 240px; width: 100%;">
            <canvas id="hashrateChart"></canvas>
        </div>
    </div>

    <div class="table-container">
        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th id="thWorker">Worker ID</th>
                        <th id="thAlgo">---</th>
                        <th id="thHashrate">---</th>
                        <th id="thEff">---</th>
                        <th id="thShares">---</th>
                        <th id="thUptime">---</th>
                        <th id="thStatus">---</th>
                    </tr>
                </thead>
                <tbody id="workersTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <footer class="footer-stats" id="footerStats" style="display:none;">
        <div class="footer-user">
            <div class="footer-avatar" id="footerAvatar">
                <span class="footer-avatar-letter" id="footerAvatarLetter">U</span>
                <img id="footerAvatarImg" src="" alt="" style="display:none;" onerror="this.style.display='none';">
            </div>
            <div class="footer-info">
                <h2 id="footerUsername">---</h2>
                <span id="lblMinerProfile">Duino-Coin Miner Profile</span>
            </div>
        </div>
        
        <div class="footer-balances">
            <div class="footer-balance-item">
                <div class="label"><span>DUCO</span></div>
                <div class="value" id="footerBalance">0.0000</div>
            </div>
            <div class="footer-balance-item">
                <div class="label">
                    <svg class="icon-svg" viewBox="0 0 24 24" style="width:14px;height:14px;fill:var(--duino-green)">
                        <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
                    </svg>
                    <span id="lblApprox">---</span>
                </div>
                <div class="value" id="footerUsd">$0.00</div>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
